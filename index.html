<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Venor</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body {font-family: Arial; background:#f3f4f6; margin:0; padding:14px;}
    .box {background:#fff; border-radius:16px; padding:14px; margin-bottom:12px;}
    h1 {text-align:center; margin:0;}
    h3 {text-align:center; margin:6px 0 0; color:#666;}
    .item {border:1px solid #ddd; border-radius:12px; padding:10px; margin-bottom:8px;}
    input {width:100%; padding:10px; border-radius:10px; border:1px solid #ccc;}
    button {width:100%; padding:12px; margin-top:8px; border:none; border-radius:10px; font-weight:bold;}
    .calc {background:#0d6efd; color:#fff;}
    .clear {background:#e5e7eb;}
    .pdf {background:#16a34a; color:#fff;}
    .summary-line {padding:6px 0; border-bottom:1px solid #eee;}
  </style>
</head>
<body>

<div class="box">
  <h1>Venor</h1>
  <h3>Closing Report</h3>
</div>

<div class="box">
  <div class="item">HungerStation<input id="a0" type="number"></div>
  <div class="item">Jahez<input id="a1" type="number"></div>
  <div class="item">To You<input id="a2" type="number"></div>
  <div class="item">Keeta<input id="a3" type="number"></div>
  <div class="item">The Chefs<input id="a4" type="number"></div>
  <div class="item">Foodics Down<input id="a5" type="number"></div>
  <div class="item">Foodics Up<input id="a6" type="number"></div>
  <div class="item">Foodics QR<input id="a7" type="number"></div>
  <div class="item">Transfer<input id="a8" type="number"></div>
  <div class="item">Additional<input id="a9" type="number"></div>
  <div class="item">Any Bill<input id="a10" type="number"></div>
  <div class="item">Party<input id="a11" type="number"></div>
  <div class="item">Cash<input id="a12" type="number"></div>
</div>

<button class="calc" onclick="calc()">Calculate</button>
<button class="clear" onclick="clearData()">Clear</button>
<button class="pdf" onclick="downloadPDF()">Download PDF</button>

<div class="box">
  <div class="summary-line" id="delivery">Total Delivery: 0.00</div>
  <div class="summary-line" id="foodics">Total Foodics: 0.00</div>
  <div class="summary-line" id="onAccount">Total On Account: 0.00</div>
  <div class="summary-line" id="final">Final Total: 0.00</div>
</div>

<script>
function get(id){return parseFloat(document.getElementById(id).value)||0;}

function calc(){
  let delivery = get('a0')+get('a1')+get('a2')+get('a3')+get('a4');
  let foodics = get('a5')+get('a6');
  let cash = get('a12');

  let final = 0;
  for(let i=0;i<=12;i++){ final += get('a'+i); }

  let onAccount = final - cash;

  document.getElementById('delivery').innerText = 'Total Delivery: '+delivery.toFixed(2);
  document.getElementById('foodics').innerText = 'Total Foodics: '+foodics.toFixed(2);
  document.getElementById('onAccount').innerText = 'Total On Account: '+onAccount.toFixed(2);
  document.getElementById('final').innerText = 'Final Total: '+final.toFixed(2);
}

function clearData(){
  for(let i=0;i<=12;i++){ document.getElementById('a'+i).value=''; }
  document.getElementById('delivery').innerText='Total Delivery: 0.00';
  document.getElementById('foodics').innerText='Total Foodics: 0.00';
  document.getElementById('onAccount').innerText='Total On Account: 0.00';
  document.getElementById('final').innerText='Final Total: 0.00';
}

function downloadPDF(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const today = new Date().toLocaleDateString('en-GB');
  const details = [
    ['HungerStation', get('a0')],
    ['Jahez', get('a1')],
    ['To You', get('a2')],
    ['Keeta', get('a3')],
    ['The Chefs', get('a4')],
    ['Foodics Down', get('a5')],
    ['Foodics Up', get('a6')],
    ['Foodics QR', get('a7')],
    ['Transfer', get('a8')],
    ['Additional', get('a9')],
    ['Any Bill', get('a10')],
    ['Party', get('a11')],
    ['Cash', get('a12')]
  ].filter(row => row[1] !== 0);

  const delivery = get('a0') + get('a1') + get('a2') + get('a3') + get('a4');
  const foodics = get('a5') + get('a6');
  const cash = get('a12');
  let final = 0;
  for(let i = 0; i <= 12; i++) final += get('a' + i);
  const onAccount = final - cash;

  doc.setFillColor(13, 110, 253);
  doc.rect(0, 0, 210, 30, 'F');
  doc.setTextColor(255,255,255);
  doc.setFontSize(20);
  doc.text('VENOR', 105, 13, {align:'center'});
  doc.setFontSize(11);
  doc.text('Closing Report', 105, 21, {align:'center'});
  doc.text('Date: ' + today, 105, 27, {align:'center'});

  doc.setTextColor(0,0,0);
  let y = 40;

  doc.setFontSize(13);
  doc.text('Entry Details', 10, y);
  y += 6;

  doc.setFillColor(240,240,240);
  doc.rect(10, y, 90, 8, 'F');
  doc.rect(100, y, 40, 8, 'F');
  doc.setFontSize(11);
  doc.text('Item', 12, y + 5.5);
  doc.text('Amount', 102, y + 5.5);
  y += 8;

  if(details.length === 0){
    doc.text('No entered items.', 12, y + 5);
    y += 10;
  } else {
    details.forEach((row, index) => {
      if(y > 260){
        doc.addPage();
        y = 20;
      }
      if(index % 2 === 0){
        doc.setFillColor(250,250,250);
        doc.rect(10, y, 90, 8, 'F');
        doc.rect(100, y, 40, 8, 'F');
      }
      doc.text(String(row[0]), 12, y + 5.5);
      doc.text(Number(row[1]).toFixed(2), 102, y + 5.5);
      y += 8;
    });
  }

  y += 8;
  if(y > 245){
    doc.addPage();
    y = 20;
  }

  doc.setFontSize(13);
  doc.text('Summary', 10, y);
  y += 6;

  const summaryRows = [
    ['Total Delivery', delivery],
    ['Total Foodics', foodics],
    ['Total On Account', onAccount],
    ['Final Total', final]
  ];

  doc.setFillColor(240,240,240);
  doc.rect(10, y, 90, 8, 'F');
  doc.rect(100, y, 40, 8, 'F');
  doc.setFontSize(11);
  doc.text('Summary Item', 12, y + 5.5);
  doc.text('Amount', 102, y + 5.5);
  y += 8;

  summaryRows.forEach((row, index) => {
    if(index % 2 === 0){
      doc.setFillColor(250,250,250);
      doc.rect(10, y, 90, 8, 'F');
      doc.rect(100, y, 40, 8, 'F');
    }
    doc.text(String(row[0]), 12, y + 5.5);
    doc.text(Number(row[1]).toFixed(2), 102, y + 5.5);
    y += 8;
  });

  doc.save('venor_report.pdf');
}
</script>

</body>
</html>
